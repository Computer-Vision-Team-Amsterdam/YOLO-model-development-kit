[build-system]
requires = ["setuptools>=70.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "yolo-model-development-kit"
version = "0.0.2"
description = "Project to develop a YOLO model using AzureML platform."
authors = [
    { name = "Sebastian Davrieux", email = "s.davrieux@amsterdam.nl" },
    { name = "Diana Epureanu", email = "d.epureanu@amsterdam.nl" },
    { name = "Andrea Lombardo", email = "a.lombardo@amsterdam.nl" },
    { name = "Daan Bloembergen", email = "d.bloembergen@amsterdam.nl" },
]
maintainers = [
    { name = "Computer Vision Team, Gemeente Amsterdam", email = "cvt@amsterdam.nl" },
]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "aml_interface",
    "azure-ai-ml>=1.20",
    "azure-storage-blob>=12.23",
    "cvtoolkit",
    "matplotlib>=3.3.0",
    "mldesigner>=0.1.0b16",
    "numpy>=1.23.0",
    "opencv-python>=4.6.0",
    "pandas>=2.0",
    "pycocotools>=2.0.8",
    "torch==2.5.1+cu118",
    "torchvision==0.20.1+cu118",
    "ultralytics>=8.3.0",
    "wandb>=0.18.0",
]

[project.optional-dependencies]
dev = [
    "pip-audit>=2.7.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.uv.sources]
aml_interface = { git = "https://github.com/Computer-Vision-Team-Amsterdam/AML-Interface.git", tag = "v1.1.2" }
cvtoolkit = { git = "https://github.com/Computer-Vision-Team-Amsterdam/CVToolkit.git", rev = "85589df7ea84f9d182137ddac9b808cdf078cc69" }
requests = { index = "pypi" }
torch = { index = "torch-cu118" }
torchaudio = { index = "torch-cu118" }
torchvision = { index = "torch-cu118" }

[[tool.uv.index]]
name = "torch-cu118"
url = "https://download.pytorch.org/whl/cu118"
explicit = true

[tool.isort]
profile = "black"
multi_line_output = 3
